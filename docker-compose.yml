services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:17
    container_name: habit-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: habit_tracker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - habit-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- API ----------
  api:
    build: .
    container_name: habit-api
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8080:8080"

    networks:
      - habit-network

networks:
  habit-network:

volumes:
  postgres_data: